name: Build EXE and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag name for the release'
        required: false

jobs:
  build_exe:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Download ffmpeg for Windows
        run: |
          Invoke-WebRequest -Uri "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip" -OutFile ffmpeg.zip
          Expand-Archive -Path ffmpeg.zip -DestinationPath ffmpeg_extracted
          $ffmpegDir = Get-ChildItem -Path ffmpeg_extracted -Directory | Select-Object -First 1
          Copy-Item "$($ffmpegDir.FullName)\bin\ffmpeg.exe" -Destination "."
          Remove-Item -Recurse -Force ffmpeg.zip, ffmpeg_extracted

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build EXE with PyInstaller
        run: |
          pyinstaller --onefile --name DouyinLiveRecorder --add-data "config;config" --add-data "src;src" --add-data "index.html;." --add-data "ffmpeg.exe;." --add-data "StopRecording.vbs;." --hidden-import=execjs --hidden-import=PyExecJS --hidden-import=src.spider --hidden-import=src.stream --hidden-import=src.web_console --hidden-import=src.config_store --noconfirm main.py

      - name: Create zip package
        run: |
          New-Item -ItemType Directory -Path release_package\config -Force
          Copy-Item dist\DouyinLiveRecorder.exe release_package\
          Copy-Item config\* release_package\config\ -Recurse
          Copy-Item index.html release_package\
          Copy-Item StopRecording.vbs release_package\
          Copy-Item ffmpeg.exe release_package\
          Compress-Archive -Path release_package\* -DestinationPath DouyinLiveRecorder_${{ github.ref_name }}_win64.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            DouyinLiveRecorder_${{ github.ref_name }}_win64.zip
            dist/DouyinLiveRecorder.exe
          generate_release_notes: true
          draft: false
          prerelease: false
